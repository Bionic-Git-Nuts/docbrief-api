<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a3c"/>
      <stop offset="100%" style="stop-color:#ff5f1f"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0c0c0f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="256" cy="260" rx="160" ry="170" fill="rgba(0,0,0,0.25)"/>

  <!-- Body -->
  <ellipse cx="256" cy="300" rx="120" ry="140" fill="url(#body)"/>

  <!-- Wings -->
  <ellipse cx="136" cy="310" rx="70" ry="100" fill="#1a1a2e" transform="rotate(-15 136 310)"/>
  <ellipse cx="376" cy="310" rx="70" ry="100" fill="#1a1a2e" transform="rotate(15 376 310)"/>

  <!-- Wing feather lines left -->
  <line x1="100" y1="270" x2="155" y2="300" stroke="rgba(255,154,60,0.3)" stroke-width="2"/>
  <line x1="95" y1="295" x2="152" y2="318" stroke="rgba(255,154,60,0.3)" stroke-width="2"/>
  <line x1="98" y1="320" x2="152" y2="336" stroke="rgba(255,154,60,0.3)" stroke-width="2"/>

  <!-- Wing feather lines right -->
  <line x1="412" y1="270" x2="357" y2="300" stroke="rgba(255,154,60,0.3)" stroke-width="2"/>
  <line x1="417" y1="295" x2="360" y2="318" stroke="rgba(255,154,60,0.3)" stroke-width="2"/>
  <line x1="414" y1="320" x2="360" y2="336" stroke="rgba(255,154,60,0.3)" stroke-width="2"/>

  <!-- Head -->
  <ellipse cx="256" cy="200" rx="95" ry="90" fill="#1a1a2e"/>

  <!-- Ear tufts -->
  <polygon points="196,128 178,72 215,118" fill="#1a1a2e"/>
  <polygon points="316,128 334,72 297,118" fill="#1a1a2e"/>
  <polygon points="196,128 178,72 215,118" fill="rgba(255,154,60,0.4)"/>
  <polygon points="316,128 334,72 297,118" fill="rgba(255,154,60,0.4)"/>

  <!-- Face disc -->
  <ellipse cx="256" cy="205" rx="78" ry="72" fill="#0f0f1a"/>

  <!-- Left eye outer -->
  <circle cx="222" cy="195" r="28" fill="#ff9a3c"/>
  <!-- Left eye inner -->
  <circle cx="222" cy="195" r="20" fill="#0c0c0f"/>
  <!-- Left eye shine -->
  <circle cx="228" cy="188" r="6" fill="white" opacity="0.9"/>
  <circle cx="215" cy="200" r="3" fill="white" opacity="0.4"/>

  <!-- Right eye outer -->
  <circle cx="290" cy="195" r="28" fill="#ff9a3c"/>
  <!-- Right eye inner -->
  <circle cx="290" cy="195" r="20" fill="#0c0c0f"/>
  <!-- Right eye shine -->
  <circle cx="296" cy="188" r="6" fill="white" opacity="0.9"/>
  <circle cx="283" cy="200" r="3" fill="white" opacity="0.4"/>

  <!-- Beak -->
  <polygon points="256,218 242,238 270,238" fill="#ff9a3c"/>

  <!-- Chest pattern -->
  <ellipse cx="256" cy="330" rx="55" ry="70" fill="#0f0f1a" opacity="0.6"/>
  <ellipse cx="256" cy="330" rx="35" ry="50" fill="rgba(255,154,60,0.08)"/>

  <!-- Chest dots -->
  <circle cx="256" cy="295" r="4" fill="rgba(255,154,60,0.5)"/>
  <circle cx="244" cy="312" r="3" fill="rgba(255,154,60,0.35)"/>
  <circle cx="268" cy="312" r="3" fill="rgba(255,154,60,0.35)"/>
  <circle cx="256" cy="328" r="3" fill="rgba(255,154,60,0.25)"/>

  <!-- Feet -->
  <ellipse cx="226" cy="430" rx="22" ry="8" fill="#1a1a2e"/>
  <ellipse cx="286" cy="430" rx="22" ry="8" fill="#1a1a2e"/>
  <line x1="210" y1="430" x2="205" y2="445" stroke="#ff9a3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="432" x2="218" y2="447" stroke="#ff9a3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="230" y1="432" x2="231" y2="447" stroke="#ff9a3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="270" y1="430" x2="269" y2="445" stroke="#ff9a3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="432" x2="282" y2="447" stroke="#ff9a3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="292" y1="430" x2="295" y2="445" stroke="#ff9a3c" stroke-width="3" stroke-linecap="round"/>

  <!-- Circuit lines on forehead (intelligence detail) -->
  <line x1="220" y1="155" x2="240" y2="155" stroke="rgba(255,154,60,0.4)" stroke-width="1.5"/>
  <line x1="240" y1="155" x2="240" y2="145" stroke="rgba(255,154,60,0.4)" stroke-width="1.5"/>
  <line x1="240" y1="145" x2="256" y2="145" stroke="rgba(255,154,60,0.4)" stroke-width="1.5"/>
  <line x1="292" y1="155" x2="272" y2="155" stroke="rgba(255,154,60,0.4)" stroke-width="1.5"/>
  <line x1="272" y1="155" x2="272" y2="145" stroke="rgba(255,154,60,0.4)" stroke-width="1.5"/>
  <line x1="272" y1="145" x2="256" y2="145" stroke="rgba(255,154,60,0.4)" stroke-width="1.5"/>
  <circle cx="256" cy="145" r="3" fill="#ff9a3c" opacity="0.7"/>
  <circle cx="240" cy="155" r="2" fill="#ff9a3c" opacity="0.5"/>
  <circle cx="272" cy="155" r="2" fill="#ff9a3c" opacity="0.5"/>
</svg>
