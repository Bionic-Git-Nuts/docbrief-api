<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0c0c0f"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a3c"/>
      <stop offset="100%" style="stop-color:#ff3cac"/>
    </linearGradient>
    <linearGradient id="neon2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3cffea"/>
      <stop offset="100%" style="stop-color:#4a9eff"/>
    </linearGradient>
    <linearGradient id="wing1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a3c" stop-opacity="0.8"/>
      <stop offset="100%" style="stop-color:#ff3cac" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="wing2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3cffea" stop-opacity="0.8"/>
      <stop offset="100%" style="stop-color:#4a9eff" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Background grid lines -->
  <g opacity="0.08" stroke="#4a9eff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Background glow orbs -->
  <circle cx="256" cy="256" r="180" fill="rgba(255,154,60,0.04)"/>
  <circle cx="180" cy="300" r="80" fill="rgba(60,255,234,0.04)"/>
  <circle cx="332" cy="300" r="80" fill="rgba(255,60,172,0.04)"/>

  <!-- Left wing — orange/pink neon -->
  <path d="M256,280 L80,180 L60,320 L120,380 L200,340 Z" fill="url(#wing1)" opacity="0.6"/>
  <path d="M256,280 L80,180 L60,320 L120,380 L200,340 Z" fill="none" stroke="url(#neon1)" stroke-width="1.5" opacity="0.8" filter="url(#glow1)"/>

  <!-- Left wing feather edges -->
  <path d="M256,280 L80,180" stroke="#ff9a3c" stroke-width="1" opacity="0.5" filter="url(#glow3)"/>
  <path d="M256,280 L70,240" stroke="#ff9a3c" stroke-width="1" opacity="0.4"/>
  <path d="M256,280 L65,290" stroke="#ff9a3c" stroke-width="1" opacity="0.35"/>
  <path d="M256,280 L75,340" stroke="#ff3cac" stroke-width="1" opacity="0.4"/>
  <path d="M256,280 L110,370" stroke="#ff3cac" stroke-width="1" opacity="0.35"/>

  <!-- Right wing — cyan/blue neon -->
  <path d="M256,280 L432,180 L452,320 L392,380 L312,340 Z" fill="url(#wing2)" opacity="0.6"/>
  <path d="M256,280 L432,180 L452,320 L392,380 L312,340 Z" fill="none" stroke="url(#neon2)" stroke-width="1.5" opacity="0.8" filter="url(#glow1)"/>

  <!-- Right wing feather edges -->
  <path d="M256,280 L432,180" stroke="#3cffea" stroke-width="1" opacity="0.5" filter="url(#glow3)"/>
  <path d="M256,280 L442,240" stroke="#3cffea" stroke-width="1" opacity="0.4"/>
  <path d="M256,280 L447,290" stroke="#3cffea" stroke-width="1" opacity="0.35"/>
  <path d="M256,280 L437,340" stroke="#4a9eff" stroke-width="1" opacity="0.4"/>
  <path d="M256,280 L402,370" stroke="#4a9eff" stroke-width="1" opacity="0.35"/>

  <!-- Body core -->
  <ellipse cx="256" cy="300" rx="85" ry="110" fill="#0a0a1a"/>
  <ellipse cx="256" cy="300" rx="85" ry="110" fill="none" stroke="url(#neon1)" stroke-width="1" opacity="0.4"/>

  <!-- Body circuit lines -->
  <line x1="256" y1="230" x2="256" y2="390" stroke="rgba(255,154,60,0.2)" stroke-width="1"/>
  <line x1="200" y1="300" x2="312" y2="300" stroke="rgba(60,255,234,0.2)" stroke-width="1"/>
  <circle cx="256" cy="300" r="5" fill="none" stroke="#ff9a3c" stroke-width="1.5" opacity="0.5"/>

  <!-- Head -->
  <ellipse cx="256" cy="210" rx="80" ry="82" fill="#0a0a1a"/>
  <ellipse cx="256" cy="210" rx="80" ry="82" fill="none" stroke="url(#neon2)" stroke-width="1.5" opacity="0.5" filter="url(#glow3)"/>

  <!-- Ear tufts -->
  <path d="M196,145 L175,80 L210,130 Z" fill="#0a0a1a"/>
  <path d="M196,145 L175,80 L210,130 Z" fill="none" stroke="#ff9a3c" stroke-width="1.5" opacity="0.7" filter="url(#glow3)"/>
  <path d="M316,145 L337,80 L302,130 Z" fill="#0a0a1a"/>
  <path d="M316,145 L337,80 L302,130 Z" fill="none" stroke="#3cffea" stroke-width="1.5" opacity="0.7" filter="url(#glow3)"/>

  <!-- Ear inner glow -->
  <line x1="190" y1="138" x2="178" y2="95" stroke="#ff9a3c" stroke-width="1" opacity="0.5"/>
  <line x1="322" y1="138" x2="334" y2="95" stroke="#3cffea" stroke-width="1" opacity="0.5"/>

  <!-- Face plate -->
  <ellipse cx="256" cy="215" rx="62" ry="60" fill="#050510"/>
  <ellipse cx="256" cy="215" rx="62" ry="60" fill="none" stroke="rgba(255,154,60,0.2)" stroke-width="1"/>

  <!-- Left eye — orange neon -->
  <circle cx="224" cy="205" r="24" fill="#0a0a1a"/>
  <circle cx="224" cy="205" r="24" fill="none" stroke="#ff9a3c" stroke-width="2" opacity="0.9" filter="url(#glow1)"/>
  <circle cx="224" cy="205" r="16" fill="#ff9a3c" opacity="0.15"/>
  <circle cx="224" cy="205" r="10" fill="#ff9a3c" opacity="0.3"/>
  <circle cx="224" cy="205" r="5" fill="#ff9a3c" opacity="0.9" filter="url(#glow2)"/>
  <!-- Eye scan line -->
  <line x1="200" y1="205" x2="248" y2="205" stroke="#ff9a3c" stroke-width="0.5" opacity="0.4"/>
  <line x1="224" y1="181" x2="224" y2="229" stroke="#ff9a3c" stroke-width="0.5" opacity="0.4"/>
  <!-- Eye shine -->
  <circle cx="231" cy="198" r="4" fill="white" opacity="0.6"/>

  <!-- Right eye — cyan neon -->
  <circle cx="288" cy="205" r="24" fill="#0a0a1a"/>
  <circle cx="288" cy="205" r="24" fill="none" stroke="#3cffea" stroke-width="2" opacity="0.9" filter="url(#glow1)"/>
  <circle cx="288" cy="205" r="16" fill="#3cffea" opacity="0.15"/>
  <circle cx="288" cy="205" r="10" fill="#3cffea" opacity="0.3"/>
  <circle cx="288" cy="205" r="5" fill="#3cffea" opacity="0.9" filter="url(#glow2)"/>
  <!-- Eye scan line -->
  <line x1="264" y1="205" x2="312" y2="205" stroke="#3cffea" stroke-width="0.5" opacity="0.4"/>
  <line x1="288" y1="181" x2="288" y2="229" stroke="#3cffea" stroke-width="0.5" opacity="0.4"/>
  <!-- Eye shine -->
  <circle cx="295" cy="198" r="4" fill="white" opacity="0.6"/>

  <!-- Beak — metallic -->
  <polygon points="256,228 243,250 269,250" fill="#1a1a2e"/>
  <polygon points="256,228 243,250 269,250" fill="none" stroke="#ff9a3c" stroke-width="1" opacity="0.6"/>
  <line x1="243" y1="239" x2="269" y2="239" stroke="#ff9a3c" stroke-width="0.5" opacity="0.4"/>

  <!-- Forehead circuit board -->
  <line x1="224" y1="168" x2="256" y2="168" stroke="#ff9a3c" stroke-width="1" opacity="0.5"/>
  <line x1="256" y1="168" x2="256" y2="158" stroke="#ff9a3c" stroke-width="1" opacity="0.5"/>
  <line x1="256" y1="158" x2="288" y2="158" stroke="#3cffea" stroke-width="1" opacity="0.5"/>
  <circle cx="256" cy="168" r="2.5" fill="#ff9a3c" opacity="0.8" filter="url(#glow3)"/>
  <circle cx="224" cy="168" r="2" fill="#ff9a3c" opacity="0.6"/>
  <circle cx="288" cy="158" r="2" fill="#3cffea" opacity="0.6"/>

  <!-- Center forehead dot -->
  <circle cx="256" cy="175" r="4" fill="none" stroke="#ff9a3c" stroke-width="1.5" opacity="0.7"/>
  <circle cx="256" cy="175" r="2" fill="#ff9a3c" opacity="0.9" filter="url(#glow3)"/>

  <!-- Chest hexagon pattern -->
  <polygon points="256,265 270,273 270,289 256,297 242,289 242,273" fill="none" stroke="rgba(255,154,60,0.3)" stroke-width="1"/>
  <polygon points="256,270 266,276 266,288 256,294 246,288 246,276" fill="rgba(255,154,60,0.05)"/>
  <circle cx="256" cy="282" r="3" fill="#ff9a3c" opacity="0.5" filter="url(#glow3)"/>

  <!-- Side panel lines left -->
  <line x1="178" y1="260" x2="200" y2="260" stroke="#ff9a3c" stroke-width="1" opacity="0.3"/>
  <line x1="175" y1="270" x2="198" y2="270" stroke="#ff9a3c" stroke-width="1" opacity="0.2"/>
  <line x1="178" y1="280" x2="200" y2="280" stroke="#ff9a3c" stroke-width="1" opacity="0.15"/>

  <!-- Side panel lines right -->
  <line x1="334" y1="260" x2="312" y2="260" stroke="#3cffea" stroke-width="1" opacity="0.3"/>
  <line x1="337" y1="270" x2="314" y2="270" stroke="#3cffea" stroke-width="1" opacity="0.2"/>
  <line x1="334" y1="280" x2="312" y2="280" stroke="#3cffea" stroke-width="1" opacity="0.15"/>

  <!-- Talons -->
  <g filter="url(#glow3)" opacity="0.8">
    <line x1="228" y1="400" x2="210" y2="430" stroke="#ff9a3c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="232" y1="402" x2="222" y2="435" stroke="#ff9a3c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="238" y1="403" x2="234" y2="437" stroke="#ff9a3c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="284" y1="400" x2="302" y2="430" stroke="#3cffea" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="280" y1="402" x2="290" y2="435" stroke="#3cffea" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="274" y1="403" x2="278" y2="437" stroke="#3cffea" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Outer ring glow -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="none" stroke="url(#neon1)" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="256" cy="256" rx="210" ry="210" fill="none" stroke="url(#neon2)" stroke-width="0.5" opacity="0.15"/>

  <!-- Corner dots -->
  <circle cx="80" cy="80" r="2" fill="#ff9a3c" opacity="0.4"/>
  <circle cx="432" cy="80" r="2" fill="#3cffea" opacity="0.4"/>
  <circle cx="80" cy="432" r="2" fill="#ff3cac" opacity="0.4"/>
  <circle cx="432" cy="432" r="2" fill="#4a9eff" opacity="0.4"/>
</svg>
